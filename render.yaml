# Despliega: Render Dashboard → Blueprints → New Blueprint → repo Spain-grpahic → este archivo.
# URL pública del API (mismo tronco del nombre de servicio): https://spain-grpahic-api.onrender.com
databases:
  - name: spain-datos-pg
    plan: free
    region: frankfurt

services:
  - type: web
    name: spain-grpahic-api
    plan: free
    region: frankfurt
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    envVars:
      - key: APP_ENV
        value: prod
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: spain-datos-pg
          property: connectionString
