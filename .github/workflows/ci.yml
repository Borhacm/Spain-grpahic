name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: editorial_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d editorial_data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/editorial_data
      APP_ENV: test
      API_KEYS: test-admin:admin,test-editor:editor,test-viewer:viewer

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Migrate database
        run: alembic upgrade head
      - name: Run tests
        run: pytest -q
